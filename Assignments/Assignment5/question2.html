<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Days Lived Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<main>
    <h1>Days Lived Calculator</h1>

    <form id="lifeForm">
        <label for="birthDate">Birth Date (required):</label><br>
        <input type="date" id="birthDate" required><br><br>

        <label for="deathDate">Death Date (optional):</label><br>
        <input type="date" id="deathDate"><br><br>

        <button type="submit">Calculate Days Lived</button>
    </form>

    <p id="result"></p>
    <p id="error" style="color:red;"></p>
</main>

<script src="question2.js"></script>
</body>
</html>
